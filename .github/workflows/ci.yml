name: CI
run-name: >
  CI - ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

# Cancel in-flight runs for the same branch/PR so pushes don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Coverage (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v5

      # Install the exact SDK pinned in global.json plus the .NET 8 SDK required
      # by the net8.0 test target. Both are needed; global-json-file alone only
      # installs the pinned version and does not guarantee .NET 8 is present.
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      # Restore once at the solution level so subsequent steps can use --no-restore.
      - name: Restore
        run: dotnet restore PolishIdentifiers.slnx

      # Build the solution so the library and tests compile cleanly before the
      # per-framework test runs. TreatWarningsAsErrors=true means any warning
      # in the library project will fail the build.
      - name: Build
        run: dotnet build PolishIdentifiers.slnx --no-restore -c Release

      # Run the net8.0 test target separately so CI explicitly validates the
      # netstandard2.0-compatible library asset through a concrete runtime.
      - name: Test (.NET 8)
        run: >
          dotnet test PolishIdentifiers.slnx
          --framework net8.0
          --no-build -c Release
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory coverage/net8

      # Run the net10.0 test target separately so CI explicitly validates the
      # modern library asset and net10-only API coverage.
      - name: Test (.NET 10)
        run: >
          dotnet test PolishIdentifiers.slnx
          --framework net10.0
          --no-build -c Release
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory coverage/net10

      # Upload the coverage report as an artifact so it is available in the
      # Actions run summary. Only uploaded once (ubuntu run) to avoid duplicates.
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage/**/coverage.cobertura.xml
          if-no-files-found: ignore
