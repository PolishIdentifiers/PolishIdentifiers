name: Release
run-name: Release - ${{ github.ref_name }}

on:
  push:
    tags:
      - 'core/v*'
      - 'json/v*'

jobs:
  publish-core:
    name: Pack & Publish Core Package
    if: ${{ startsWith(github.ref_name, 'core/v') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Verify Tag Matches Package Version
        run: |
          package_version="$(grep -oPm1 '(?<=<Version>)[^<]+' src/PolishIdentifiers/PolishIdentifiers.csproj)"
          tag_name="${{ github.ref_name }}"
          tag_version="${tag_name#core/v}"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "::error::Release tag '$tag_name' does not match package version '$package_version' in src/PolishIdentifiers/PolishIdentifiers.csproj."
            exit 1
          fi

      - name: Restore
        run: dotnet restore PolishIdentifiers.slnx

      - name: Build
        run: dotnet build PolishIdentifiers.slnx --no-restore -c Release

      # Re-run tests before publishing so a broken release cannot reach either feed.
      - name: Test
        run: >
          dotnet test PolishIdentifiers.slnx
          --no-build -c Release
          --logger "console;verbosity=normal"

      - name: Pack
        run: >
          dotnet pack src/PolishIdentifiers/PolishIdentifiers.csproj
          --no-build -c Release
          -o nupkg

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --skip-duplicate

  publish-json:
    name: Pack & Publish System.Text.Json Package
    if: ${{ startsWith(github.ref_name, 'json/v') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Verify Tag Matches Package Version
        run: |
          package_version="$(grep -oPm1 '(?<=<Version>)[^<]+' src/PolishIdentifiers.SystemTextJson/PolishIdentifiers.SystemTextJson.csproj)"
          tag_name="${{ github.ref_name }}"
          tag_version="${tag_name#json/v}"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "::error::Release tag '$tag_name' does not match package version '$package_version' in src/PolishIdentifiers.SystemTextJson/PolishIdentifiers.SystemTextJson.csproj."
            exit 1
          fi

      - name: Restore
        run: dotnet restore PolishIdentifiers.slnx

      - name: Build
        run: dotnet build PolishIdentifiers.slnx --no-restore -c Release

      # Re-run tests before publishing so a broken release cannot reach either feed.
      - name: Test
        run: >
          dotnet test PolishIdentifiers.slnx
          --no-build -c Release
          --logger "console;verbosity=normal"

      - name: Pack
        run: >
          dotnet pack src/PolishIdentifiers.SystemTextJson/PolishIdentifiers.SystemTextJson.csproj
          --no-build -c Release
          -o nupkg

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --skip-duplicate
